<div class="chatbot-container">
  <div class="chat-header">
    <h3>Dental Assistant</h3>

    <button class="close-button" (click)="closeChat()" aria-label="Close Chat">
      &times;
    </button>
  </div>
  <div class="chat-messages" #chatMessages (click)="onMessagesClick($event)" (scroll)="onMessagesScroll()">
    @for (message of messages; track message.id) {
      <div class="message-row" [ngClass]="{'user-row': message.sender === 'user', 'bot-row': message.sender === 'bot'}">
        @if (message.sender === 'bot') {
          <img src="chatbot.png" alt="Bot Icon" class="message-avatar bot-avatar">
        }
        @if (message.sender === 'bot') {
          <div class="message-bubble bot-bubble" [innerHTML]="message.text"></div>
        } @else {
          <div class="message-bubble user-bubble">{{ message.text }}</div>
        }
      </div>
    }
    @if (isSending) {
      <div class="message-row bot-row">
        <img src="chatbot.png" alt="Bot Icon" class="message-avatar bot-avatar">
        <div class="message-bubble bot-bubble typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    }
  </div>
  <form class="chat-input" (ngSubmit)="sendMessage()">
    <input
      type="text"
      name="userInput"
      [(ngModel)]="userInput"
      [disabled]="isSending"
      placeholder="Type your question..."
      autocomplete="off"
    />
    <button type="submit" [disabled]="isSending || !userInput.trim()" aria-label="Send">
      <span class="material-icons">send</span>
    </button>
  </form>
</div>
