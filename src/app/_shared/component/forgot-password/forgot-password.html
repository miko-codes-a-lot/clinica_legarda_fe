<div class="login-container">
  <div class="login-card">
    <h2>Forgot Password</h2>
    <p class="login-subtitle">Enter your account email. We'll send a 6-digit code to your registered phone number.</p>

    <form [formGroup]="rxform" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="emailAddress">Email</label>
        <input
          id="emailAddress"
          type="email"
          placeholder="you@example.com"
          formControlName="emailAddress"
          autocomplete="email"
        />
      </div>

      <button type="submit" [disabled]="!rxform.valid || isLoading">
        {{ isLoading ? 'Sending...' : 'Send OTP' }}
      </button>
    </form>

    <p class="login-footer">
      <a routerLink="/app/login">Back to Login</a>
    </p>
  </div>
</div>
