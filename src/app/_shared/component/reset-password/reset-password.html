<div class="login-container">
  <div class="login-card">
    <h2>Set New Password</h2>
    <p class="login-subtitle">Choose a new password for your account.</p>

    <form [formGroup]="rxform" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          id="newPassword"
          type="password"
          placeholder="At least 8 characters"
          formControlName="newPassword"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          type="password"
          placeholder="Re-enter new password"
          formControlName="confirmPassword"
          autocomplete="new-password"
        />
      </div>

      @if (rxform.errors?.['mismatch'] && confirmPassword.touched) {
        <p class="error-text">Passwords do not match.</p>
      }

      <button type="submit" [disabled]="!rxform.valid || isLoading">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </form>

    <p class="login-footer">
      <a routerLink="/app/login">Back to Login</a>
    </p>
  </div>
</div>
